apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: concord-data
  namespace: concord
  labels:
    app.kubernetes.io/name: concord
    app.kubernetes.io/component: storage
    app.kubernetes.io/part-of: concord-cognitive-engine
spec:
  accessModes:
    - ReadWriteMany
  resources:
    requests:
      storage: 100Gi
  # ReadWriteMany enables multi-replica access (requires NFS, EFS, or similar CSI driver).
  # For single-node deployments, ReadWriteOnce also works.
  # Uncomment and set a storageClassName if your cluster requires it:
  # storageClassName: efs-sc
